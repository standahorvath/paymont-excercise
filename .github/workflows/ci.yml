name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build

  docker:
    if: github.event_name != 'pull_request'
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [docker]
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER }}
      APP_CONTAINER_NAME: www-paymount-prod
      APP_DOMAIN: paymount-a48dff.tonakodi.cz
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 5 -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 $SSH_USER@$SSH_HOST << "EOF"
            echo '${{ secrets.REGISTRY_TOKEN }}' | docker login ghcr.io -u "standahorvath" --password-stdin

            APP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            echo "--- Pulling new application image: $APP_IMAGE ---"
            docker pull $APP_IMAGE

            echo "--- Redeploying Application Container: ${{ env.APP_CONTAINER_NAME }} ---"
            docker stop ${{ env.APP_CONTAINER_NAME }} || true
            docker rm ${{ env.APP_CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.APP_CONTAINER_NAME }} \
              --restart always \
              --network webproxy \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.${{ env.APP_CONTAINER_NAME }}.rule=Host(\`${{ env.APP_DOMAIN }}\`)" \
              -l "traefik.http.routers.${{ env.APP_CONTAINER_NAME }}.entrypoints=websecure" \
              -l "traefik.http.routers.${{ env.APP_CONTAINER_NAME }}.tls.certresolver=myresolver" \
              -l "traefik.http.services.${{ env.APP_CONTAINER_NAME }}.loadbalancer.server.port=80" \
              $APP_IMAGE

            echo "--- Cleaning up unused Docker images ---"
            docker image prune -af
          EOF
